name: Execute tests on OCP
on:
  workflow_dispatch:
  workflow_call:
    secrets:
      OPENSHIFT_SERVER:
        required: true
      OPENSHIFT_USER:
        required: true
      OPENSHIFT_PASSWORD:
        required: true
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
    branches:
      - master
      - main
jobs:
  ocp-e2e-ci:
    if: ${{ github.event_name != 'pull_request_target' || contains(github.event.pull_request.labels.*.name, 'ok-to-test') }}
    runs-on: ubuntu-latest
    concurrency:
      group: ocp-e2e-ci
    steps:

    - name: Check out code
      uses: actions/checkout@v7
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha }}
        persist-credentials: false
        allow-unsafe-pr-checkout: true

    - name: Set up Go 1.25
      uses: actions/setup-go@v5
      with:
        go-version: 1.25

    - name: Build and install kube-burner-ocp
      run: |
        make build
        sudo make install
        cp /usr/bin/kube-burner-ocp /tmp/kube-burner-ocp

    - name: Install bats
      uses: bats-core/bats-action@1.5.4
      with:
        bats-version: 1.10.0
        support-install: false
        assert-install: false
        detik-install: false
        file-install: false

    - name: Install oc
      uses: redhat-actions/oc-installer@v1

    - name: Authenticate against OCP cluster
      run: oc login -u ${OPENSHIFT_USER} -p ${OPENSHIFT_PASSWORD} ${OPENSHIFT_SERVER} --insecure-skip-tls-verify=true
      env:
        OPENSHIFT_SERVER: ${{ secrets.OPENSHIFT_SERVER }}
        OPENSHIFT_USER: ${{ secrets.OPENSHIFT_USER }}
        OPENSHIFT_PASSWORD: ${{ secrets.OPENSHIFT_PASSWORD }}

    - name: Install Virtctl
      run: |
        KUBEVIRT_VERSION=$(gh release view --repo kubevirt/kubevirt --json tagName -q '.tagName')
        wget https://github.com/kubevirt/kubevirt/releases/download/${KUBEVIRT_VERSION}/virtctl-${KUBEVIRT_VERSION}-linux-amd64 -O /tmp/virtctl
        chmod +x /tmp/virtctl
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Execute Tests
      run: |
        export PATH=${PATH}:/tmp/
        chmod +x /tmp/kube-burner-ocp
        make test-ocp
      env:
        TERM: linux
        PERFSCALE_PROD_ES_SERVER: ${{ secrets.PERFSCALE_PROD_ES_SERVER }}
        TEST_BINARY: "/tmp/kube-burner-ocp"
        DIFF_TARGET: "origin/${{ github.base_ref }}"
